name: Full CI/CD with Self-Hosted Runner

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, docker]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Backend
        run: |
          cd backend
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/email-app-backend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/email-app-backend:latest \
            -f dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/email-app-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/email-app-backend:latest
          echo "✅ Backend image pushed"
      
      - name: Build and Push Frontend
        run: |
          cd client
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:latest \
            -f dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:latest
          echo "✅ Frontend image pushed"

      - name: Check if monitoring configs changed
        id: check_monitoring
        run: |
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep -E "prometheus/|grafana/" \
            && echo "monitoring_changed=true" >> $GITHUB_OUTPUT \
            || echo "monitoring_changed=false" >> $GITHUB_OUTPUT

      - name: Ensure monitoring services are running
        run: |
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          # Start monitoring only if not already running, never recreate
          docker-compose up -d --no-deps --no-recreate cadvisor node-exporter prometheus grafana
          echo "✅ Monitoring services running"

      - name: Deploy Application Services
        run: |
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

          # Pull the latest backend image (built above, no build context in compose)
          docker-compose pull backend

          # Frontend: build from local dockerfile as defined in docker-compose
          # Backend: use pulled image
          # --force-recreate ensures fresh containers, --no-deps never touches monitoring
          docker-compose up -d --no-deps --force-recreate backend frontend
          
          echo "✅ App services deployed"

      - name: Deploy Monitoring Services (if configs changed)
        if: steps.check_monitoring.outputs.monitoring_changed == 'true'
        run: |
          echo "📊 Monitoring configs changed, updating..."
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          docker-compose up -d --no-deps --force-recreate prometheus grafana cadvisor node-exporter
          echo "✅ Monitoring services updated"

      - name: Verify Application
        run: |
          echo "🔍 Verifying deployment..."

          # Wait for backend /health with retries (up to 60 seconds)
          echo "⏳ Waiting for backend..."
          for i in $(seq 1 12); do
            if curl -s -f http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ Backend is healthy"
              break
            fi
            if [ $i -eq 12 ]; then
              echo "❌ Backend is not responding after 60s"
              echo "--- Backend logs ---"
              docker-compose logs --tail=50 backend
              exit 1
            fi
            echo "   Attempt $i/12 - waiting 5s..."
            sleep 5
          done

          # Wait for frontend with retries (up to 60 seconds)
          echo "⏳ Waiting for frontend..."
          for i in $(seq 1 12); do
            if curl -s -f http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Frontend is healthy"
              break
            fi
            if [ $i -eq 12 ]; then
              echo "❌ Frontend is not responding after 60s"
              echo "--- Frontend logs ---"
              docker-compose logs --tail=50 frontend
              exit 1
            fi
            echo "   Attempt $i/12 - waiting 5s..."
            sleep 5
          done

      - name: Deployment Summary
        run: |
          echo "🚀 Deployment complete!"
          echo "🌐 Frontend:   http://localhost:3000"
          echo "🔧 Backend:    http://localhost:5000"
          echo "📊 Prometheus: http://localhost:9090"
          echo "📈 Grafana:    http://localhost:3001 (admin/admin)"
          echo ""
          echo "Running containers:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
