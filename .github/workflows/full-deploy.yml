name: Full CI/CD with Self-Hosted Runner

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, docker]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Backend
        run: |
          cd backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/email-app-backend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/email-app-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/email-app-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/email-app-backend:latest
      
      - name: Build and Push Frontend
        run: |
          cd client
          docker build -t ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:latest
      
      - name: Check if monitoring configs changed
        id: check_monitoring
        run: |
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E "prometheus/|grafana/" && echo "monitoring_changed=true" >> $GITHUB_OUTPUT || echo "monitoring_changed=false" >> $GITHUB_OUTPUT
      
      - name: Deploy Application Services
        run: |
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          
          # Pull latest images
          docker-compose pull backend frontend
          
          # Recreate ONLY backend and frontend, never touch monitoring
          docker-compose up -d --no-deps --force-recreate backend frontend
          
          echo "✅ App services deployed"
      
      - name: Deploy Monitoring Services (if configs changed)
        if: steps.check_monitoring.outputs.monitoring_changed == 'true'
        run: |
          echo "📊 Monitoring configs changed, updating..."
          # --no-recreate = only start if not already running
          docker-compose up -d --no-deps --no-recreate prometheus grafana cadvisor node-exporter
          echo "✅ Monitoring services updated"
      
      - name: Verify Application
        run: |
          echo "🔍 Verifying deployment..."

          # Wait for backend with retries (up to 60 seconds)
          echo "⏳ Waiting for backend..."
          for i in $(seq 1 12); do
            if curl -s -f http://localhost:5000 > /dev/null 2>&1; then
              echo "✅ Backend is healthy"
              break
            fi
            if [ $i -eq 12 ]; then
              echo "❌ Backend is not responding after 60s"
              echo "--- Backend container logs ---"
              docker-compose logs --tail=50 backend
              exit 1
            fi
            echo "   Attempt $i/12 - waiting 5s..."
            sleep 5
          done

          # Wait for frontend with retries (up to 60 seconds)
          echo "⏳ Waiting for frontend..."
          for i in $(seq 1 12); do
            if curl -s -f http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Frontend is healthy"
              break
            fi
            if [ $i -eq 12 ]; then
              echo "❌ Frontend is not responding after 60s"
              echo "--- Frontend container logs ---"
              docker-compose logs --tail=50 frontend
              exit 1
            fi
            echo "   Attempt $i/12 - waiting 5s..."
            sleep 5
          done
      
      - name: Deployment Summary
        run: |
          echo "🚀 Deployment complete!"
          echo "🌐 Frontend: http://localhost:3000"
          echo "🔧 Backend API: http://localhost:5000"
          echo "📊 Prometheus: http://localhost:9090"
          echo "📈 Grafana: http://localhost:3001 (admin/admin)"
          echo ""
          echo "Running containers:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
