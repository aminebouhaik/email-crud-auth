name: Full CI/CD with Self-Hosted Runner

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.github/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, docker]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Backend
        run: |
          cd backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/email-app-backend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/email-app-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/email-app-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/email-app-backend:latest
      
      - name: Build and Push Frontend
        run: |
          cd client
          docker build -t ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/email-app-frontend:latest
      
      - name: Check if monitoring configs changed
        id: check_monitoring
        run: |
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E "prometheus/|grafana/" && echo "monitoring_changed=true" >> $GITHUB_OUTPUT || echo "monitoring_changed=false" >> $GITHUB_OUTPUT
      
      - name: Deploy Application Services
        run: |
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          
          # Only restart app services
          docker-compose up -d --no-deps --build backend frontend
          
          echo "✅ App services deployed"
      
      - name: Deploy Monitoring Services (if configs changed)
        if: steps.check_monitoring.outputs.monitoring_changed == 'true'
        run: |
          echo "📊 Monitoring configs changed, updating..."
          docker-compose up -d prometheus grafana cadvisor node-exporter
          echo "✅ Monitoring services updated"
      
      - name: Verify Application
        run: |
          echo "🔍 Verifying deployment..."
          sleep 10
          
          # Check backend
          if curl -s -f http://localhost:5000 > /dev/null; then
            echo " Backend is healthy"
          else
            echo " Backend is not responding"
            exit 1
          fi
          
          # Check frontend
          if curl -s -f http://localhost:3000 > /dev/null; then
            echo " Frontend is healthy"
          else
            echo " Frontend is not responding"
            exit 1
          fi
      
      - name: Deployment Summary
        run: |
          echo " Deployment complete!"
          echo " Frontend: http://localhost:3000"
          echo "Backend API: http://localhost:5000"
          echo " Prometheus: http://localhost:9090"
          echo "Grafana: http://localhost:3001 (admin/admin)"
          echo ""
          echo "Running containers:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
