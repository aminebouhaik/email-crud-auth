

services:

  postgres:
    image: postgres:15
    container_name: email_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: email_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
      timeout: 5s
    networks:
      - email_network

  backend:
    image: ${DOCKER_USERNAME:-aminebouhaik13}/email-app-backend:latest
    container_name: email_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: password
      DB_DATABASE: email_app
      DB_PORT: 5432
      JWT_SECRET: mysecret
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - email_network

  frontend:
    build:
      context: ./client
      dockerfile: dockerfile  # Specify your lowercase dockerfile
    image: ${DOCKER_USERNAME:-aminebouhaik13}/email-app-frontend:latest
    container_name: email_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - email_network
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - email_network
    depends_on:
      - cadvisor
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /etc/machine-id:/etc/machine-id:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    networks:
      - email_network
  
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - email_network
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3001:3000"  # Using 3001 since your frontend uses 3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Change this!
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - email_network
    depends_on:
      - prometheus


volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  email_network:
    driver: bridge